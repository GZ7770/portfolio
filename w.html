<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guilherme Zenni | Portfólio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-dark: #101010;
            --color-olive: #b5bcad;
            --color-light: #e6e6e6;
            --color-white: #f0f0f0;
            --color-grey: #858585;
            --font-display: 'Bebas Neue', sans-serif;
            --font-tech: 'Inter Tight', sans-serif;
            --body-text-color: var(--color-grey);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--color-dark); color: var(--color-white); font-family: var(--font-tech); overflow-x: hidden; }

        .noise-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E'); mix-blend-mode: overlay; }

        .title { font-family: var(--font-display); font-size: clamp(1.5rem, 2.8vw, 3.5rem); line-height: 1; letter-spacing: 0.05em; text-transform: uppercase; }
        .body { font-size: 13px; line-height: 1.8; color: var(--body-text-color); max-width: 500px; }
        .micro { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 500; }

        header { position: fixed; top: 0; left: 0; width: 100%; padding: 40px 5vw; display: flex; justify-content: space-between; z-index: 999; mix-blend-mode: difference; }

        .hero { min-height: 100vh; padding: 0 5vw; display: flex; align-items: center; background-color: var(--color-dark); overflow: hidden; position: relative; }

        /* A IMAGEM ESTÁ AQUI */
        .hero-bg { position: absolute; inset: 0; z-index: 0; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) contrast(1.12) brightness(0.92); animation: hero-kenburns 18s ease-in-out infinite alternate; }
        
        .hero-duotone { position: absolute; inset: 0; background: radial-gradient(circle at 50% 45%, var(--color-olive) 0%, #4d5446 42%, #15160f 100%); mix-blend-mode: color; }
        .hero-light { position: absolute; inset: 0; background: radial-gradient(circle at 50% 40%, rgba(229,232,222,0.4) 0%, transparent 60%); mix-blend-mode: soft-light; }
        .hero-vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(0,0,0,0) 38%, rgba(0,0,0,0.62) 100%); }

        @keyframes hero-kenburns { 0% { transform: scale(1); } 100% { transform: scale(1.09); } }

        .hero-copy-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 10; position: relative; }
        .hero-title { font-size: clamp(2.6rem, 7.5vw, 6.5rem); line-height: 0.96; }
        
        .cta-btn { display: inline-flex; border: 1px solid currentColor; padding: 12px 32px; border-radius: 50px; text-decoration: none; color: inherit; }
    </style>
</head>
<body>

<div class="noise-overlay"></div>

<header>
    <div class="micro">[ 2026 ] /// GUILHERME ZENNI</div>
</header>

<section class="hero">
    <div class="hero-bg" id="heroBg">
        <img src="assets/imagem hero.png" alt="Hero" class="hero-img">
        <div class="hero-duotone"></div>
        <div class="hero-light"></div>
        <div class="hero-vignette"></div>
    </div>

    <div class="hero-copy-wrap" id="heroCopyWrap">
        <h1 class="title hero-title">
            <span>SISTEMAS</span><span>SÃO</span><span>CULTURA.</span>
        </h1>
        <div style="margin-top: 40px;">
            <a href="#projetos" class="cta-btn micro">[ VER PROJETOS ]</a>
        </div>
    </div>
</section>

<script>
    window.addEventListener('scroll', () => {
        const heroBg = document.getElementById('heroBg');
        const heroCopy = document.getElementById('heroCopyWrap');
        let scroll = window.scrollY;
        heroBg.style.transform = `translateY(${scroll * 0.3}px)`;
        heroCopy.style.opacity = Math.max(0, 1 - scroll / 500);
    });
</script>
</body>
</html>
